<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <fieldset>
        <legend>Form Attributes</legend>
        <label for="">Text :</label>
        <input type="text" /><br /><br />
        <label for="">PassWord :</label>
        <input type="password" /><br /><br />
        <label for="">Number :</label>
        <input type="number" /><br /><br />
        <label for="">Tell :</label>
        <input type="Tell" /><br /><br />
        <label for="">Email :</label>
        <input type="email" /><br /><br />
        <label for="">Url :</label>
        <input type="url" /><br /><br />
        <label for="">Date :</label>
        <input type="date" /><br /><br />
        <label for="">Month :</label>
        <input type="month" /><br /><br />
        <label for="">Time :</label>
        <input type="time" /><br /><br />
        <label for="">Color :</label>
        <input type="color" /><br /><br />
        <label for="">File :</label>
        <input type="file" /><br /><br />
        <label for="">Image :</label>
        <input type="image" /><br /><br />
        <label for="">Search :</label>
        <input type="search" /><br /><br />
        <label for="">Submit :</label>
        <input type="submit" /><br /><br />
        <label for="">Hidden :</label>
        <input type="hidden" /><br /><br />
        <label for="">TextArea :</label><br />
        <textarea name="" id=""></textarea><br /><br />
        <label for="">Range :</label>
        <input type="range" /><br />

        <h1>Radio Example</h1>
        <label for="">Gender : </label><br />
        Male : <input type="radio" name="gender" /><br />
        Female : <input type="radio" name="gender" /><br />
        <hr />
        <h1>Check Box Example</h1>
        <label for="">Languages : </label><br />
        Java : <input type="checkbox" name="gender" /><br />
        C++ : <input type="checkbox" name="gender" /><br />
        JavaScript : <input type="checkbox" name="gender" /><br />
        Python : <input type="checkbox" name="gender" /><br />
        <hr />
        <h1>Select Example</h1>
        <select name="" id="">
          Brand Phone :
          <option value="">Samsung</option>
          <option value="">Apple</option>
          <option value="" selected>Realme</option>
        </select>
      </fieldset>
    </form>
  </body>
</html>
