<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <fieldset>
        <table>
          <tr>
            <td><label for="fullname">FullName</label></td>
            <td>
              <input type="text" id="fullname" required />(max 20 char a-z and
              A-Z)
            </td>
          </tr>
          <tr>
            <td><label for="lastname">LastName</label></td>
            <td>
              <input type="text" name="lastname" required />(max 20 char a-z and
              A-Z)
            </td>
          </tr>
          <tr>
            <td><label for="DOB">Date Of Birth :</label></td>
            <td><input type="date" id="DOB" required /></td>
          </tr>
          <tr>
            <td><label for="gender">GENDER</label></td>
            <td>
              <input type="radio" name="gender" required />male
              <input type="radio" name="gender" required />female
            </td>
          </tr>
          <tr>
            <td><label for="email">Email ID</label></td>
            <td><input type="email" required /></td>
          </tr>
          <tr>
            <td><label for="MobileNo">Mobile No</label></td>
            <td><input type="number" id="MobileNo" required /></td>
          </tr>
          <tr>
            <td><label for="ADDRESS">ADDRESS</label></td>
            <td><textarea name="" id="ADDRESS"></textarea></td>
          </tr>
          <tr>
            <td><label for="city">City</label></td>
            <td><input type="text" id="city" required /></td>
          </tr>
          <tr>
            <td><label for="pincode">PINCODE</label></td>
            <td><input type="text" id="pincode" required />(6 Digit number)</td>
          </tr>
          <tr>
            <td><label for="email">EMAIL ID</label></td>
            <td><input type="email" id="email" required /></td>
          </tr>
          <tr>
            <td><label for="country">COUNTRY</label></td>
            <td><input type="text" id="country" required /></td>
          </tr>
          <tr>
            <td><label for="hobbies">HOBBIES</label></td>
            <td>
              <input type="checkbox" />Drawing<input
                type="checkbox"
              />Singing<input type="checkbox" />Dancing<input
                type="checkbox"
              />Others
            </td>
          </tr>
        </table>
        <table>
          <tr>
            <td rowspan="5">Qualification</td>
            <td>SL.no</td>
            <td>Examination</td>
            <td>Board</td>
            <td>Percentage</td>
            <td>Year Of Passing</td>
          </tr>
          <tr>
            <td>01</td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
          </tr>
          <tr>
            <td>02</td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
          </tr>
          <tr>
            <td>03</td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
          </tr>
          <tr>
            <td>04</td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
          </tr>
          <tr>
            <td>
              <label for="">
                COURSES <br />
                APPLIED <br />
                FOR
              </label>
            </td>
            <td colspan="2">
              <input type="checkbox" />BCA<input type="checkbox" />B.com<input
                type="checkbox"
              />B.sc<input type="checkbox" />B.A
            </td>
          </tr>
        </table>
        <center><button>submit</button><button>reset</button></center>
      </fieldset>
    </form>
  </body>
</html>
